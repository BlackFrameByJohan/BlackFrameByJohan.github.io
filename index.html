<!DOCTYPE html>

    <title>Black Frame | Portfolio</title>
    <style>
        body { background-color: #050505; color: #fff; font-family: sans-serif; margin: 0; }
        
        /* Contenedores de video */
        .video-container-box { position: relative; width: 100%; overflow: hidden; background: #000; }
        .ratio-horizontal { padding-bottom: 56.25%; }
        .ratio-vertical { padding-bottom: 177.77%; }
        .video-container-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        /* ESCUDOS DE PROTECCIÓN */
        .shield-block { position: absolute; z-index: 10; background: transparent; }
        
        /* Bloquea mitad izquierda superior */
        .shield-top-left { top: 0; left: 0; width: 50%; height: 60%; }
        
        /* Bloquea toda la franja inferior (protege links de canal/título) */
        .shield-bottom-full { bottom: 0; left: 0; width: 100%; height: 20%; }
        
        /* Galería */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; padding: 20px; }
        .gallery-item { aspect-ratio: 4/5; background: #111; position: relative; overflow: hidden; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <!-- SECCIÓN VIDEOS (Ajustada con los escudos que liberan controles) -->
    <section id="videography">
        <!-- EJEMPLO HORIZONTAL -->
        <div class="video-container-box ratio-horizontal">
            <!-- Escudos: Protegen el logo y enlaces, pero dejan libre la esquina inferior derecha -->
            <div class="shield-block shield-top-left"></div>
            <div class="shield-block shield-bottom-full"></div>
