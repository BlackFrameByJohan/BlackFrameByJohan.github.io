<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Frame by Johan</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#000;
            color:white;
            font-family:Arial, Helvetica, sans-serif;
        }

        .hero{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            text-align:center;
        }

        h1{
            font-size:70px;
            letter-spacing:8px;
        }

        h2{
            margin-top:15px;
            color:#aaa;
            font-weight:300;
        }

        a{
            margin-top:40px;
            padding:15px 40px;
            border:1px solid white;
            color:white;
            text-decoration:none;
            transition:.3s;
        }

        a:hover{
            background:white;
            color:black;
        }
    </style>
</head>

<body>

<section class="hero">

<h1>BLACK FRAME</h1>

<h2>by Johan</h2>

<a href="#">Portfolio</a>

</section>

</body>
</html>
